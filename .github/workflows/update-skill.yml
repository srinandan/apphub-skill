name: Update Skill

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .skill file
        run: zip -r apphub-skill.skill SKILL.md references/adk-docs.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apphub-skill.skill
          git diff --staged --quiet || git commit -m "chore: regenerate apphub-skill.skill"
          git push