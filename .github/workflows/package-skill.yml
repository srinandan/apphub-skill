# This action automatically updates the apphub-skill.skill file
name: Package Skill

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Inject version into SKILL.md
        run: |
          TAG="${{ github.ref_name }}"
          SHA="${{ steps.vars.outputs.sha }}"
          VERSION="${TAG}+${SHA}"
          sed -i "s/version: \".*\"/version: \"${VERSION}\"/" SKILL.md
          echo "Injected version: ${VERSION}"

      - name: Build .skill file
        run: zip -r apphub-skill.skill SKILL.md references/ scripts/


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apphub-skill.skill
          generate_release_notes: true