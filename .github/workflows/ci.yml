name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          format: tty
          severity: error

  validate-skill:
    name: Validate SKILL.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install PyYAML
      - name: Validate SKILL.md
        run: python3 .github/scripts/validate_skill.py SKILL.md

  link-check:
    name: Check for dead links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README.md for dead links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          base-branch: main
          file-path: README.md
          config-file: .github/linters/mlc_config.json
          # If the config file above doesn't exist, it uses defaults
